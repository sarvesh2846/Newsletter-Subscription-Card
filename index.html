<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="mt-20 mx-52 flex flex-wrap rounded border-2 border-black rounded-lg">
        <!-- Quote Container -->
         <div class="w-full bg-gradient-to-t from-sky-500 to-indigo-500 text-white h-24 flex justify-center items-center font-bold text-xl border-x-2 rounded-t">
            News you can Trust.</div>
         <!-- Content Container -->
          <div class="w-full text-center mt-6">
            <h3 class="text-lg font-semibold">Stay up to date with the Latest!</h3>
            <p>Subscribe to our newsletter for the latest news straight into your inbox.</p>
            <form class="flex flex-wrap">
                <input type="email" 
                placeholder="your@email.com" 
                class="w-full mx-52 bg-slate-200 text-center placeholder:text-sm m-4 py-2 rounded">
                <button class="bg-blue-500 w-full text-white m-4 py-2 rounded-full">Subscribe Now</button>
            </form>
            <p class="my-6 text-sm">We value your privacy</p>
          </div>

    </div>
</body>
</html>
